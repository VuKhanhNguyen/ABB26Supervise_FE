<body class="bg-background text-on-background font-body selection:bg-primary/30 min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Decorative Elements (Kinetic Cockpit Aesthetic) -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-96 h-96 bg-secondary/5 rounded-full blur-[100px]"></div>
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_transparent_0%,_#131313_70%)]"></div>
<div class="w-full h-full opacity-10" data-alt="Technical blueprint grid pattern overlay with subtle white lines on a dark carbon background" style="background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 40px 40px;">
</div>

<!-- Main Content Container -->
<main class="z-10 w-full max-w-md px-6 py-12 flex flex-col space-y-8">
<!-- Header Section -->
<header class="flex flex-col items-center text-center space-y-2">
<div class="mb-4">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">
                    bolt
                </span>
</div>
<h1 class="font-headline text-2xl font-bold tracking-[0.3em] text-primary uppercase">
                AB26 SUPERVISE
            </h1>
<p class="font-label text-on-surface-variant text-xs tracking-widest uppercase">
                Kinetic Intelligence System v2.0
            </p>
</header>
<!-- Login Card -->
<section class="glass-panel p-8 rounded-xl border-t border-primary/20 shadow-2xl">
<form class="space-y-6" onsubmit="return false;">
<!-- Email Input -->
<div class="space-y-1.5">
<label class="font-label text-xs font-bold text-on-surface-variant tracking-wider uppercase flex justify-between" for="email">
<span>OPERATOR ID</span>
<span class="text-primary/50 text-[10px]">EMAIL ADDRESS</span>
</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">alternate_email</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-surface-container-lowest border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 text-on-surface placeholder:text-outline-variant font-headline transition-all" id="email" placeholder="RIDER_IDENT@AB26.COM" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="font-label text-xs font-bold text-on-surface-variant tracking-wider uppercase flex justify-between" for="password">
<span>ENCRYPTION KEY</span>
<span class="text-primary/50 text-[10px]">PASSWORD</span>
</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">lock</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-surface-container-lowest border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 text-on-surface placeholder:text-outline-variant font-headline transition-all" id="password" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Utilities -->
<div class="flex items-center justify-between">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="w-4 h-4 rounded-sm border-outline-variant bg-surface-container text-primary focus:ring-offset-background focus:ring-primary" type="checkbox"/>
<span class="font-label text-[10px] text-on-surface-variant group-hover:text-on-surface transition-colors tracking-widest uppercase">REMEMBER SESSION</span>
</label>
<a class="font-label text-[10px] text-primary hover:text-primary-container transition-colors tracking-widest uppercase underline decoration-primary/30 underline-offset-4" href="#">
                        RECOVER ACCESS
                    </a>
</div>
<!-- Action Button -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-lg tracking-[0.2em] uppercase primary-glow transition-all active:scale-95 flex items-center justify-center space-x-3" type="submit">
<span class="material-symbols-outlined text-xl">login</span>
<span>INITIATE LOGIN</span>
</button>
</form>
</section>
<!-- Secondary Actions -->
<footer class="flex flex-col items-center space-y-6">
<div class="flex items-center w-full space-x-4">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-outline-variant/30"></div>
<span class="font-label text-[10px] text-outline-variant tracking-widest">OR</span>
<div class="h-[1px] flex-1 bg-gradient-to-l from-transparent to-outline-variant/30"></div>
</div>
<button class="flex items-center space-x-2 group">
<span class="font-label text-xs text-on-surface-variant tracking-widest uppercase">NEW TO PROTOCOL?</span>
<span class="font-label text-xs text-secondary group-hover:text-primary transition-colors tracking-widest uppercase font-bold">CREATE AN ACCOUNT</span>
